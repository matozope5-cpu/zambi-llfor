<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
  <title>Dashboard · Zambia Loans</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon.192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon.512.png"/>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    /* ----- ZAMBIA LOANS · MOBILE OPTIMIZED (TIGHTER) ----- */
    :root {
      --green: #0A6B35;
      --green-light: #2E9B5E;
      --green-soft: #E3F1E7;
      --red: #C62828;
      --orange: #E65100;
      --orange-light: #FFB74D;
      --bg: #F4F9F2;
      --card: #FFFFFF;
      --text-main: #1C281E;
      --text-soft: #4F6654;
      --border-light: rgba(10, 107, 53, 0.15);
      --shadow-card: 0 8px 20px -4px rgba(0, 25, 0, 0.08);
      --radius-card: 20px;
      --radius-element: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #F4F9F2 0%, #EAF3E7 100%);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 10px 24px;
      line-height: 1.4;
    }

    .dashboard-container {
      max-width: 440px;
      width: 100%;
      margin: 0 auto;
    }

    /* ----- HEADER (compact) ----- */
    .app-header {
      text-align: center;
      margin-bottom: 14px;
    }

    .title-line {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .site-title {
      font-size: clamp(1.9rem, 10vw, 2.3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(145deg, var(--green) 0%, #15803D 70%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }

    .flag-dots {
      display: flex;
      gap: 4px;
    }
    .flag-dots span {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-black { background: #1E1E1E; }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 6px 16px;
      border-radius: 60px;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.9);
      font-weight: 600;
      font-size: 0.85rem;
      color: #1E3A22;
    }

    /* ----- NAV BAR (logout) ----- */
    .nav-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .logout-btn {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      padding: 8px 16px;
      color: var(--text-main);
      font-weight: 600;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }
    .logout-btn i {
      color: var(--orange);
      font-size: 0.9rem;
    }
    .logout-btn:active {
      background: white;
      transform: scale(0.97);
    }

    /* ----- SPINNER ----- */
    .spinner {
      width: 44px;
      height: 44px;
      margin: 40px auto;
      border: 4px solid rgba(10, 107, 53, 0.1);
      border-top-color: var(--green);
      border-right-color: var(--orange);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ----- DASHBOARD CARD (compact) ----- */
    .loan-summary-card {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 20px 18px 24px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255,255,255,0.9);
      margin-bottom: 18px;
      backdrop-filter: blur(2px);
    }

    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .status-badge {
      background: var(--green-soft);
      padding: 5px 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-badge i {
      color: var(--green);
      font-size: 0.8rem;
    }

    .loan-detail-grid {
      display: grid;
      gap: 12px;
      margin: 16px 0 10px;
    }
    .detail-item {
      background: #F9FDF8;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border-light);
    }
    .detail-label {
      font-size: 0.8rem;
      color: var(--text-soft);
      font-weight: 500;
    }
    .detail-value {
      font-weight: 700;
      color: var(--text-main);
      font-size: 1rem;
    }
    .highlight {
      color: var(--green);
      font-size: 1.2rem;
      font-weight: 800;
    }

    .ref-number {
      text-align: right;
      margin-top: 12px;
      font-size: 0.7rem;
      color: var(--text-soft);
      border-top: 1px dashed var(--border-light);
      padding-top: 12px;
    }

    /* ----- TRUST FOOTER (compact) ----- */
    .trust-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 8px;
    }
    .trust-pill {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #1E3A22;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--border-light);
    }
    .trust-pill i {
      color: var(--green);
      font-size: 0.7rem;
    }

    .footer-note {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-soft);
      margin-top: 16px;
    }

    /* Extra tight for very small screens */
    @media (max-width: 360px) {
      .dashboard-container { padding: 0 4px; }
      .loan-summary-card { padding: 18px 14px; }
      .detail-item { padding: 12px 12px; }
      .detail-label { font-size: 0.75rem; }
      .detail-value { font-size: 0.9rem; }
      .highlight { font-size: 1.1rem; }
      .site-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="dashboard-container">

  <!-- HEADER -->
  <header class="app-header">
    <div class="title-line">
      <h1 class="site-title">Zambia Loans</h1>
      <div class="flag-dots">
        <span class="dot-green"></span>
        <span class="dot-red"></span>
        <span class="dot-black"></span>
        <span class="dot-orange"></span>
      </div>
    </div>
    <div class="welcome-badge">
      <i class="fas fa-user-circle"></i>
      <span id="welcome-name">Customer</span>
    </div>
  </header>

  <!-- NAVIGATION / LOGOUT -->
  <div class="nav-bar">
    <button class="logout-btn" id="logout-btn">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>

  <!-- LOADING SPINNER -->
  <div id="loading-spinner" class="spinner"></div>

  <!-- DASHBOARD CONTENT -->
  <div id="dashboard-content" style="display: none;">
    
    <!-- MAIN LOAN CARD -->
    <div class="loan-summary-card">
      <div class="status-header">
        <span style="font-weight: 600; color: #1E3A22; font-size: 0.9rem;"><i class="fas fa-file-invoice"></i> Loan summary</span>
        <span class="status-badge" id="status-badge">
          <i class="fas fa-check-circle"></i> <span id="status-text">Approved</span>
        </span>
      </div>

      <div class="loan-detail-grid">
        <div class="detail-item">
          <span class="detail-label">Loan amount</span>
          <span class="detail-value highlight" id="loan-amount">ZMW 0</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Processing fee (paid)</span>
          <span class="detail-value" id="processing-fee">Ksh 0</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Est. repayment</span>
          <span class="detail-value" id="repayment-amount">ZMW 0</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Disbursement</span>
          <span class="detail-value">Within 48h</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Due date</span>
          <span class="detail-value" id="due-date">--/--/----</span>
        </div>
      </div>

      <div class="ref-number">
        <i class="far fa-copy"></i> Ref: ZMB-<span id="ref-number">XXXXXX</span>
      </div>
    </div>

    <!-- TRUST BADGES -->
    <div class="trust-strip">
      <div class="trust-pill"><i class="fas fa-lock"></i> SSL Secured</div>
      <div class="trust-pill"><i class="fas fa-building-columns"></i> BoZ Regulated</div>
      <div class="trust-pill"><i class="fas fa-headset"></i> 24/7 Support</div>
      <div class="trust-pill"><i class="fas fa-users"></i> 15k+ Zambians</div>
    </div>

    <div class="footer-note">
      <i class="far fa-clock"></i> Disbursement within 48 hours · No hidden fees
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    const spinner = document.getElementById('loading-spinner');
    const content = document.getElementById('dashboard-content');
    const welcomeName = document.getElementById('welcome-name');
    const logoutBtn = document.getElementById('logout-btn');

    function formatZMW(amount) {
      return 'ZMW ' + Number(amount).toLocaleString();
    }

    function formatKES(amount) {
      return 'Ksh ' + Number(amount).toLocaleString();
    }

    function generateRef() {
      const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      let ref = '';
      for (let i = 0; i < 6; i++) ref += chars[Math.floor(Math.random() * chars.length)];
      return ref;
    }

    function formatDate(date) {
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function loadDashboardData() {
      let loanData = JSON.parse(sessionStorage.getItem('loanApproved') || '{}');
      const legacyData = JSON.parse(sessionStorage.getItem('myLoan') || '{}');
      
      if (!loanData.loan_amount_zmw && legacyData.loan_amount) {
        loanData = {
          name: legacyData.name || 'Customer',
          loan_amount_zmw: Math.round(legacyData.loan_amount / 23),
          fee_paid_kes: legacyData.processing_fee || 0,
          phone_number: legacyData.phone_number,
          payment_reference: legacyData.paymentReference
        };
      }

      const firstName = loanData.name ? loanData.name.split(' ')[0] : 'Customer';
      welcomeName.textContent = firstName;

      if (!loanData.loan_amount_zmw && !loanData.loan_amount) {
        window.location.href = 'apply.html';
        return;
      }

      const loanAmountZMW = loanData.loan_amount_zmw || Math.round((loanData.loan_amount || 5000) / 23);
      const feeKES = loanData.fee_paid_kes || loanData.processing_fee || 0;
      
      document.getElementById('loan-amount').textContent = formatZMW(loanAmountZMW);
      document.getElementById('processing-fee').textContent = formatKES(feeKES);
      
      const repayment = Math.round(loanAmountZMW * 1.1);
      document.getElementById('repayment-amount').textContent = formatZMW(repayment);
      
      const due = new Date();
      due.setMonth(due.getMonth() + 2);
      document.getElementById('due-date').textContent = formatDate(due);
      
      const ref = loanData.payment_reference ? 
        loanData.payment_reference.slice(-6).toUpperCase() : 
        generateRef();
      document.getElementById('ref-number').textContent = ref;

      const statusEl = document.getElementById('status-text');
      const badgeEl = document.getElementById('status-badge');
      if (loanData.approvedAt) {
        statusEl.textContent = 'Approved';
        badgeEl.style.background = '#E3F1E7';
      } else {
        statusEl.textContent = 'Processing';
        badgeEl.style.background = '#FFF3E0';
        badgeEl.style.color = '#B45309';
      }
    }

    setTimeout(() => {
      spinner.style.display = 'none';
      content.style.display = 'block';
      loadDashboardData();
    }, 1800);

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('zambiaLoan');
      sessionStorage.removeItem('loanApproved');
      sessionStorage.removeItem('myLoan');
      sessionStorage.removeItem('userData');
      window.location.href = 'index.html';
    });

  })();
</script>
</body>
</html>
